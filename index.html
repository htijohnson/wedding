<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gina & Justin — We're Getting Married!</title>

    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #b89868;
            --accent-hover: #9c7f53;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* Header Section */
        header {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .sub-title {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 500;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 400;
            color: #222;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .date-location {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-style: italic;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* Image Wrapper */
        .image-container {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(184, 152, 104, 0.2);
            padding: 8px;
            background: #fff;
            object-fit: cover;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--accent);
            margin: 40px auto;
            opacity: 0.6;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 30px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card h3 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* RSVP Form */
        .rsvp-section {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 50px;
        }

        .rsvp-section h2 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .rsvp-section p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button.btn {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 14px 35px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        button.btn:hover {
            background-color: var(--accent-hover);
        }

        .status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--accent);
            display: none;
        }

        footer {
            margin-top: auto;
            padding-bottom: 30px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--text-muted);
            font-style: italic;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .hero-img { max-height: 320px; }
            .rsvp-section { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Header -->
        <header>
            <p class="sub-title">We are getting married</p>
            <h1>Gina & Justin</h1>
            <p class="date-location">October 10, 2026</p>
        </header>

        <!-- Centered Main Image -->
        <div class="image-container">
            <img src="https://htijohnson.github.io/wedding/gj.png" alt="Gina and Justin" class="hero-img">
        </div>

        <div class="divider"></div>

        <!-- Details Grid -->
        <div class="details-grid">
            <div class="card">
                <h3>Schedule</h3>
                <p><strong>Guest Arrival:</strong> 2:00 PM</p>
                <p><strong>Ceremony Begins:</strong> 3:00 PM</p>
            </div>
            <div class="card">
                <h3>Location</h3>
                <p>91317 Stallings Lane</p>
                <p>Eugene, OR 97408</p>
            </div>
        </div>

        <!-- RSVP Form -->
        <div class="rsvp-section">
            <h2>RSVP</h2>
            <p>Please kindly respond by September 10, 2026</p>

            <form id="rsvpForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="e.g. Jane Doe" required>
                </div>

                <div class="form-group">
                    <label for="attendance">Will you be attending?</label>
                    <select id="attendance" name="attendance" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Joyfully Accepts">Joyfully Accepts</option>
                        <option value="Regretfully Declines">Regretfully Declines</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="guestCount">Total Number of Guests in Party</label>
                    <input type="number" id="guestCount" name="guestCount" min="1" max="10" value="1" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">Send RSVP</button>
                <div id="statusMessage" class="status-message">Sending your RSVP...</div>
            </form>
        </div>

        <!-- Footer -->
        <footer>
            <p>We can't wait to celebrate with you!</p>
        </footer>
    </div>

    <script>
        // Replace with your Web App URL from Google Apps Script
        const GOOGLE_SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

        const form = document.getElementById('rsvpForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            statusMsg.style.display = 'block';
            statusMsg.innerText = 'Sending your RSVP...';

            const formData = new FormData(form);

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                statusMsg.innerText = 'Thank you! Your RSVP has been submitted.';
                form.reset();
                submitBtn.disabled = false;
            })
            .catch(error => {
                statusMsg.innerText = 'Thank you! Your RSVP has been submitted.';
                form.reset();
                submitBtn.disabled = false;
            });
        });
    </script>

</body>
</html>
