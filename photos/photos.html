<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gina & Justin — Photo Gallery</title>

    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --card-bg: rgba(20, 20, 20, 0.75); /* Frosted glass dark background */
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
            --accent: #e5c188; /* Warm gold */
            --accent-hover: #d4a96a;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Full page background image with dark overlay */
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.65)), 
                        url('https://htijohnson.github.io/wedding/gj.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* Navigation / Header */
        header {
            margin-top: 20px;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent-hover);
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 3.2rem;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* Slideshow Card Container */
        .slideshow-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 30px;
        }

        /* Main Image Viewport */
        .slideshow-viewport {
            position: relative;
            width: 100%;
            height: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            position: absolute;
        }

        .slide-img.active {
            opacity: 1;
            position: relative;
        }

        /* Controls Toolbar */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--accent);
            color: #111111;
            font-weight: 600;
            border: none;
            padding: 10px 22px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .counter {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--text-muted);
            min-width: 90px;
            text-align: center;
        }

        /* Thumbnail Navigation Strip */
        .thumb-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 5px 5px 5px;
            margin-top: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .thumb-strip::-webkit-scrollbar {
            height: 6px;
        }

        .thumb-strip::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .thumb-img {
            width: 65px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            opacity: 0.4;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            flex-shrink: 0;
        }

        .thumb-img:hover {
            opacity: 0.8;
        }

        .thumb-img.active {
            opacity: 1;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(229, 193, 136, 0.6);
        }

        footer {
            margin-top: auto;
            padding-bottom: 25px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--text-muted);
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.4rem; }
            .slideshow-viewport { height: 350px; }
            .btn { padding: 8px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1>Photo Gallery</h1>
        </header>

        <!-- Main Slideshow Card -->
        <div class="slideshow-card">
            <div class="slideshow-viewport">
                <img id="mainImage" class="slide-img active" src="" alt="Wedding Photo">
            </div>

            <!-- Slideshow Controls -->
            <div class="controls">
                <button class="btn" id="prevBtn">‹ Prev</button>
                <button class="btn" id="pauseBtn">Pause</button>
                <button class="btn" id="nextBtn">Next ›</button>
            </div>
            <div class="counter" id="photoCounter">1 / 81</div>

            <!-- Thumbnails Strip -->
            <div class="thumb-strip" id="thumbStrip"></div>
        </div>

        <footer>
            <p>Gina & Justin — October 10, 2026</p>
        </footer>
    </div>

    <script>
        const TOTAL_PHOTOS = 81;
        const BASE_URL = 'https://htijohnson.github.io/wedding/photos/';
        const INTERVAL_MS = 3000; // 3 seconds

        let currentIndex = 1;
        let isPlaying = true;
        let slideTimer = null;

        const mainImage = document.getElementById('mainImage');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const counter = document.getElementById('photoCounter');
        const thumbStrip = document.getElementById('thumbStrip');

        // Pad numbers to 2 digits (e.g. 1 -> "01", 12 -> "12")
        function formatNumber(num) {
            return num.toString().padStart(2, '0');
        }

        // Build array of image filenames (01.jpg through 81.jpg)
        function getPhotoUrl(index) {
            return `${BASE_URL}${formatNumber(index)}.jpg`;
        }

        // Initialize Thumbnails Strip
        function initThumbnails() {
            for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                const thumb = document.createElement('img');
                thumb.src = getPhotoUrl(i);
                thumb.className = 'thumb-img' + (i === 1 ? ' active' : '');
                thumb.alt = `Thumbnail ${i}`;
                thumb.dataset.index = i;
                thumb.addEventListener('click', () => {
                    goToSlide(i);
                    resetTimer();
                });
                thumbStrip.appendChild(thumb);
            }
        }

        // Update the displayed photo
        function updateSlide() {
            mainImage.classList.remove('active');

            setTimeout(() => {
                mainImage.src = getPhotoUrl(currentIndex);
                mainImage.classList.add('active');
            }, 150);

            // Update Counter Text
            counter.innerText = `${currentIndex} / ${TOTAL_PHOTOS}`;

            // Update Active Thumbnail & Scroll into view
            const thumbs = thumbStrip.querySelectorAll('.thumb-img');
            thumbs.forEach((thumb, idx) => {
                if (idx + 1 === currentIndex) {
                    thumb.classList.add('active');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex % TOTAL_PHOTOS) + 1;
            updateSlide();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 2 + TOTAL_PHOTOS) % TOTAL_PHOTOS + 1;
            updateSlide();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlide();
        }

        function startSlideshow() {
            if (!slideTimer) {
                slideTimer = setInterval(nextSlide, INTERVAL_MS);
            }
            isPlaying = true;
            pauseBtn.innerText = 'Pause';
        }

        function stopSlideshow() {
            if (slideTimer) {
                clearInterval(slideTimer);
                slideTimer = null;
            }
            isPlaying = false;
            pauseBtn.innerText = 'Play';
        }

        function togglePlayPause() {
            if (isPlaying) {
                stopSlideshow();
            } else {
                startSlideshow();
            }
        }

        function resetTimer() {
            if (isPlaying) {
                clearInterval(slideTimer);
                slideTimer = setInterval(nextSlide, INTERVAL_MS);
            }
        }

        // Event Listeners
        nextBtn.addEventListener('click', () => {
            nextSlide();
            resetTimer();
        });

        prevBtn.addEventListener('click', () => {
            prevSlide();
            resetTimer();
        });

        pauseBtn.addEventListener('click', togglePlayPause);

        // Keyboard Arrow Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
                resetTimer();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
                resetTimer();
            } else if (e.key === ' ') { // Spacebar to Pause/Play
                e.preventDefault();
                togglePlayPause();
            }
        });

        // Initialize on load
        initThumbnails();
        updateSlide();
        startSlideshow();
    </script>

</body>
</html>
