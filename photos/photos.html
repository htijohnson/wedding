<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gina & Justin — Photo Gallery</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: rgba(25, 25, 25, 0.75);
            --accent: #e5c188;
            --accent-hover: #d4a96a;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 1px;
            font-weight: 400;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover, .btn.active {
            background: var(--accent);
            color: #111;
        }

        .slideshow-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 65vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 25, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            position: absolute;
        }

        .slide-img.active {
            opacity: 1;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: var(--accent);
            border: 1px solid rgba(229, 193, 136, 0.4);
            font-size: 1.8rem;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 50%;
            user-select: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .prev { left: 15px; }
        .next { right: 15px; }

        .counter {
            position: absolute;
            bottom: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .grid-wrapper {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            margin-top: 10px;
        }

        .grid-wrapper img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .grid-wrapper img:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }

        footer {
            margin-top: auto;
            padding-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .slideshow-wrapper { height: 50vh; }
            .nav-btn { padding: 6px 12px; font-size: 1.4rem; }
            .grid-wrapper { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Memories</h1>
        <div class="controls">
            <button class="btn active" id="slideshowViewBtn">Slideshow</button>
            <button class="btn" id="gridViewBtn">Grid View</button>
            <button class="btn" id="autoplayBtn">Pause Autoplay</button>
        </div>
    </header>

    <div class="slideshow-wrapper" id="slideshowContainer">
        <button class="nav-btn prev" id="prevBtn">&#10094;</button>
        <img src="" id="currentSlide" class="slide-img active" alt="Gallery Photo">
        <button class="nav-btn next" id="nextBtn">&#10095;</button>
        <div class="counter" id="slideCounter">1 / 79</div>
    </div>

    <div class="grid-wrapper" id="gridContainer"></div>

    <footer>
        <p>Special thanks to <a href="https://www.beesplusmulberryphotography.com/" target="_blank" rel="noopener noreferrer">Bees Plus Mulberry Photography</a> for these beautiful photos.</p>
    </footer>

    <script>
        const BASE_URL = 'https://ginajustin.wedding/photos/';

        // Generate paths: padded 2-digit numbers (1–81, skipping 65 and 68)
        const photoFiles = Array.from({ length: 81 }, (_, i) => i + 1)
            .filter(num => num !== 65 && num !== 68)
            .map(num => {
                const paddedNum = String(num).padStart(2, '0');
                const ext = (num === 79 || num === 80) ? 'gif' : 'jpg';
                return `${BASE_URL}${paddedNum}.${ext}`;
            });

        let currentIndex = 0;
        let autoplayInterval = null;
        let isAutoplay = true;

        const currentSlide = document.getElementById('currentSlide');
        const slideCounter = document.getElementById('slideCounter');
        const slideshowContainer = document.getElementById('slideshowContainer');
        const gridContainer = document.getElementById('gridContainer');
        const slideshowViewBtn = document.getElementById('slideshowViewBtn');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const autoplayBtn = document.getElementById('autoplayBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Populate Grid
        photoFiles.forEach((file, idx) => {
            const img = document.createElement('img');
            img.src = file;
            img.alt = `Photo ${idx + 1}`;
            img.loading = "lazy";
            img.addEventListener('click', () => {
                showSlide(idx);
                switchToSlideshow();
            });
            gridContainer.appendChild(img);
        });

        function showSlide(index) {
            if (index < 0) {
                currentIndex = photoFiles.length - 1;
            } else if (index >= photoFiles.length) {
                currentIndex = 0;
            } else {
                currentIndex = index;
            }

            currentSlide.classList.remove('active');
            setTimeout(() => {
                currentSlide.src = photoFiles[currentIndex];
                currentSlide.classList.add('active');
                slideCounter.innerText = `${currentIndex + 1} / ${photoFiles.length}`;
            }, 150);
        }

        function nextSlide() { showSlide(currentIndex + 1); }
        function prevSlide() { showSlide(currentIndex - 1); }

        function startAutoplay() {
            if (!autoplayInterval) {
                autoplayInterval = setInterval(nextSlide, 3500);
                autoplayBtn.innerText = 'Pause Autoplay';
                isAutoplay = true;
            }
        }

        function stopAutoplay() {
            clearInterval(autoplayInterval);
            autoplayInterval = null;
            autoplayBtn.innerText = 'Play Autoplay';
            isAutoplay = false;
        }

        function switchToSlideshow() {
            slideshowContainer.style.display = 'flex';
            gridContainer.style.display = 'none';
            slideshowViewBtn.classList.add('active');
            gridViewBtn.classList.remove('active');
        }

        function switchToGrid() {
            slideshowContainer.style.display = 'none';
            gridContainer.style.display = 'grid';
            gridViewBtn.classList.add('active');
            slideshowViewBtn.classList.remove('active');
        }

        nextBtn.addEventListener('click', () => { nextSlide(); if (isAutoplay) startAutoplay(); });
        prevBtn.addEventListener('click', () => { prevSlide(); if (isAutoplay) startAutoplay(); });

        autoplayBtn.addEventListener('click', () => {
            if (isAutoplay) stopAutoplay();
            else startAutoplay();
        });

        slideshowViewBtn.addEventListener('click', switchToSlideshow);
        gridViewBtn.addEventListener('click', switchToGrid);

        // Initialize
        showSlide(0);
        startAutoplay();
    </script>
</body>
</html>
